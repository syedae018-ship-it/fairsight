<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FairSight — Login to your AI Bias Detection dashboard.">
    <title>Login — FairSight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #9ca3af;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Background ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, rgba(167,139,250,0.02) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo svg {
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        .login-logo p {
            font-size: 14px;
            color: #6b7280;
            margin-top: 8px;
        }

        /* Card */
        .login-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 36px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 60px rgba(167,139,250,0.04),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* Flash messages */
        .flash-msg {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .flash-msg.error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }
        .flash-msg.success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #86efac;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #d1d5db;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            height: 48px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0 16px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-input::placeholder {
            color: #4b5563;
        }
        .form-input:focus {
            border-color: rgba(167,139,250,0.5);
            box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            height: 48px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255,255,255,0.15);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .divider span {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
        }

        /* Guest button */
        .btn-guest {
            width: 100%;
            height: 44px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #9ca3af;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-guest:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.2);
            color: #ffffff;
        }

        /* Footer hint */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #4b5563;
        }
        .login-footer strong {
            color: #6b7280;
            font-weight: 500;
        }

        /* Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container {
            animation: fadeUp 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="login-logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h1>FairSight</h1>
            <p>AI-Powered Bias Detection Platform</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-msg {{ category }}">
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="you@company.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login">Log In</button>
            </form>

            <div class="divider"><span>or</span></div>

            <a href="{{ url_for('auth.guest_login') }}" class="btn-guest">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Continue as Guest
            </a>
        </div>

        <!-- Footer hint -->
        <div class="login-footer">
            <p>Demo credentials: <strong>admin@fairsight.ai</strong> / <strong>admin123</strong></p>
        </div>
    </div>

    <script>
    // Client-side validation
    document.getElementById('login-form').addEventListener('submit', function(e) {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailRegex.test(email)) {
            e.preventDefault();
            alert('Please enter a valid email address.');
            return;
        }
        if (!password) {
            e.preventDefault();
            alert('Password is required.');
            return;
        }
    });
    </script>
</body>
</html>
